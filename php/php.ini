; Sample php.ini for Mania de Leitura (WordPress + WooCommerce)
; Adapted from WordPress recommended settings

[PHP]

; Max execution time for long-running operations (e.g., imports, exports)
max_execution_time = 300

; Max input time
max_input_time = 120

; Memory limit — WooCommerce and larger sites benefit from more memory
memory_limit = 256M

; Max upload file size (covers media uploads, PDFs, etc.)
upload_max_filesize = 64M

; Max POST size (must be >= upload_max_filesize)
post_max_size = 64M

; Max input vars — some page builders / plugins exceed the default 1000
max_input_vars = 3000

; Enable error display for local development; disable in production
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Log errors to a file
log_errors = On
error_log = /var/log/php_errors.log

; File uploads
file_uploads = On

; Allow URL fopen (useful for some plugins; disable in production if not needed)
allow_url_fopen = On

; Timezone — adjust to your region
date.timezone = America/Sao_Paulo

; OPcache settings for PHP 8.x
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1

; Xdebug — localhost development only
zend_extension=xdebug.so
xdebug.mode=develop,coverage,debug,profile
xdebug.idekey=docker
xdebug.start_with_request=yes
xdebug.log=/dev/stdout
xdebug.log_level=0
xdebug.client_port=9003
xdebug.client_host=192.168.0.6
